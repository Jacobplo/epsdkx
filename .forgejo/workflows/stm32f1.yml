name: STM32F1
on: [push]

jobs:
  Build:
    runs-on: native
    steps:
      - name: Clone the repository
        uses: https://data.forgejo.org/actions/checkout@v6

      - name: Debug
        run: |
          echo "PROJECT_ROOT=$PROJECT_ROOT"
          echo "workspace=${{ forgejo.workspace }}"
          env | sort

      - name: Build all modules
        working-directory: ./tests/build
        run: |
          export EPSDKX_ROOT="${{ forgejo.workspace }}"
          export FAMILY=stm32f1
          export BOARD=bluepillplus
          export CC=arm-none-eabi-gcc
          export OBJCOPY=arm-none-eabi-objcopy
          make all

  StaticAnalysis:
    runs-on: native
    steps: 
      - name: Clone the repository
        uses: https://data.forgejo.org/actions/checkout@v6

      - name: Run static analysis on HAL code
        run: cppcheck --max-ctu-depth=10 ${{ forgejo.workspace }}/hal
